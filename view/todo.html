<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Todo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        * {
            font-family: cursive, Times, serif;
            box-sizing: border-box;
        }

        .container {
            max-width: 700px;
        }

        .card {
            border-radius: 12px;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .todo-text strong {
            font-size: 16px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body class="bg-success">


    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-warning" onclick="window.history.back()">Go Back</button>
            <button class="btn btn-warning" onclick="deleteAllTodos()">Reset</button>
        </div>

        <div class="text-center text-white mb-4">
            <h2>📝 Todo Manager</h2>
        </div>

        <!-- ADD TODO -->
        <div class="card shadow p-3 mb-4">
            <div class="row g-2">
                <div class="col-md-5">
                    <input class="form-control" id="todoName" placeholder="Todo title">
                </div>

                <div class="col-md-5">
                    <input class="form-control" id="todoDesc" placeholder="Description">
                </div>

                <div class="col-md-2 d-grid">
                    <button class="btn btn-success" onclick="addTodo()">Add</button>
                </div>
            </div>
        </div>

        <!-- ACTIVE TODOS -->
        <div class="card shadow p-3 mb-4">
            <h5>📌 Active Tasks</h5>
            <ul class="list-group mt-2" id="todoList"></ul>
        </div>

        <!-- COMPLETED -->
        <div class="card shadow p-3">
            <h5>✅ Completed</h5>
            <ul class="list-group mt-2" id="completedList"></ul>
        </div>

    </div>

    <script>

        const API = "http://localhost:4000/api/todos";

        document.addEventListener("DOMContentLoaded", loadTodos);

        // LOAD
        async function loadTodos() {
            const res = await axios.get(API);

            const todos = res.data;

            todoList.innerHTML = "";
            completedList.innerHTML = "";

            if (!res.data.length) {
                todoList.innerHTML = `<li class="list-group-item text-center text-muted">No active todos yet 🚀</li>`;
                completedList.innerHTML = `<li class="list-group-item text-center text-muted">No completed todos yet 🚀</li>`;
                return;
            }

            todos.forEach(todo => {
                if (todo.completed) renderCompleted(todo);
                else renderTodo(todo);
            });
        }

        // ADD
        async function addTodo() {

            const name = todoName.value.trim();
            const desc = todoDesc.value.trim();

            if (!name || !desc) return;

            await axios.post(API, {
                name,
                description: desc,
                completed: false
            });

            todoName.value = "";
            todoDesc.value = "";

            loadTodos();

        }

        // ACTIVE
        function renderTodo(todo) {

            const li = document.createElement("li");
            li.className = "list-group-item";

            li.innerHTML = `
                <div class="todo-item">
                    <div class="todo-text">
                        <strong>${todo.name}</strong><br>
                        <small>${todo.description}</small>
                    </div>

                    <div>
                        <button class="btn btn-success btn-sm me-2" onclick="markDone(${todo.id})">✔</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTodo(${todo.id})">✖</button>
                    </div>
                </div>
            `;

            todoList.appendChild(li);

        }

        // COMPLETED
        function renderCompleted(todo) {

            const li = document.createElement("li");
            li.className = "list-group-item completed";

            li.innerHTML = `
                <strong>${todo.name}</strong><br>
                <small>${todo.description}</small>
            `;

            completedList.appendChild(li);

        }

        // DELETE
        async function deleteTodo(id) {

            await axios.delete(`${API}/${id}`);
            loadTodos();

        }

        // DELETE ALL
        async function deleteAllTodos() {

            if (!confirm("Delete all todos?")) return;

            await axios.delete(API);
            loadTodos();

        }

        // MARK DONE
        async function markDone(id) {

            await axios.put(`${API}/${id}`, {
                completed: true
            });

            loadTodos();

        }

    </script>

</body>

</html>
