<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f4f4;
        }

        .container {
            max-width: 600px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <h3 class="text-center mb-4">Expense Tracker</h3>

        <div class="card p-4">

            <form id="expenseForm">

                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" required>
                        <option value="">Select Category</option>
                        <option value="Fuel">Fuel</option>
                        <option value="Food">Food</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Movie">Movie</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <input type="text" class="form-control" placeholder="Enter description" id="description" required>
                </div>


                <div class="mb-3">
                    <label for="amount" class="form-label">Amount</label>
                    <input type="number" class="form-control" id="amount" placeholder="Enter amount (₹)" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Add Expense
                </button>

            </form>

        </div>

        <h4 class="mt-4">Expenses</h4>

        <ul id="expenseList" class="list-group mt-2"></ul>

    </div>

    <script>

        const form = document.getElementById("expenseForm")
        const expenseList = document.getElementById("expenseList")

        let expenses = []
        let baseUrl = "http://localhost:3000/expenses"

        async function loadExpenses() {
            const res = await fetch(baseUrl);
            expenses = await res.json();
            displayExpenses();
        }

        window.onload = loadExpenses;

        form.addEventListener("submit", async function (e) {

            e.preventDefault()

            const amount = document.getElementById("amount").value
            const description = document.getElementById("description").value
            const category = document.getElementById("category").value

            const expense = {
                amount,
                description,
                category
            }

            await fetch(baseUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ amount, description, category })
            });

            loadExpenses();

            form.reset()

        })

        function displayExpenses() {

            expenseList.innerHTML = ""

            expenses.forEach((expense, index) => {

                const li = document.createElement("li")

                li.className = "list-group-item expense-item"

                li.innerHTML = `
                    <span>₹${expense.amount} - ${expense.description} (${expense.category})</span>
                    <div>
                        <button class="btn btn-warning btn-sm me-2" onclick="editExpense(${index})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteExpense(${index})">Delete</button>
                    </div>
                `;

                expenseList.appendChild(li)

            })

        }

        async function deleteExpense(index) {

            await fetch(`${baseUrl}/${id}`, {
                method: "DELETE"
            });
            loadExpenses();

        }

        async function updateExpense(id) {
            const amount = document.getElementById("amount").value;
            const description = document.getElementById("description").value;
            const category = document.getElementById("category").value;

            await fetch(`${baseUrl}/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ amount, description, category })
            });

            loadExpenses();
        }

        function editExpense(index) {
            const expense = expenses[index];
            document.getElementById("amount").value = expense.amount;
            document.getElementById("description").value = expense.description;
            document.getElementById("category").value = expense.category;

            form.onsubmit = function (e) {
                e.preventDefault();
                updateExpense(expense.id);
                form.onsubmit = null; // Reset to default after editing
            }
        }

    </script>

</body>

</html>
