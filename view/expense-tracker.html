<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            font-family: cursive, Times, serif;
            box-sizing: border-box;
        }
    </style>
</head>

<body class="bg-primary">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-warning" onclick="window.history.back()">Go Back</button>
            <button class="btn btn-warning" onclick="deleteAllExpenses()">Reset</button>
        </div>

        <div class="card shadow-lg">
            <div class="card-body">

                <h2 class="text-center mb-5">Expense Tracker 💸</h2>

                <!-- FORM -->
                <form id="expense-form" class="row g-2 mb-4">
                    <div class="col-md-3">
                        <input type="text" id="name" class="form-control" placeholder="Expense Name" required>
                    </div>

                    <div class="col-md-2">
                        <input type="number" id="amount" class="form-control" placeholder="Amount" required>
                    </div>

                    <div class="col-md-2">
                        <select id="category" class="form-select" required>
                            <option value="">Category</option>
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="col-md-2 d-grid">
                        <button id="submitBtn" type="submit" class="btn btn-primary">Add</button>
                    </div>
                </form>

                <!-- FILTER -->
                <div class="d-flex justify-content-end mb-3">
                    <select id="filter" class="form-select w-auto">
                        <option value="All">All</option>
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Entertainment</option>
                        <option>Other</option>
                    </select>
                </div>

                <!-- TABLE -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="list"></tbody>
                    </table>
                </div>

                <!-- TOTAL -->
                <h5 class="text-end">Total: ₹<span id="total">0</span></h5>

            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:4000/api/expenses";

        const form = document.getElementById("expense-form");
        const list = document.getElementById("list");
        const totalEl = document.getElementById("total");
        const filter = document.getElementById("filter");
        const submitBtn = document.getElementById("submitBtn");

        let expenses = [];
        let editId = null;

        // 🔥 LOAD DATA ON PAGE LOAD
        window.addEventListener("DOMContentLoaded", fetchExpenses);

        // ✅ GET ALL EXPENSES
        async function fetchExpenses() {
            try {
                const res = await axios.get(API);
                expenses = res.data;
                render(expenses);
                updateTotal(expenses);
            } catch (err) {
                console.error(err);
            }
        }

        // ✅ ADD EXPENSE
        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const expense = {
                name: form.name.value,
                amount: parseFloat(form.amount.value),
                category: form.category.value,
                date: form.date.value
            };

            try {

                if (editId) {
                    // 🔥 UPDATE API
                    await axios.put(`${API}/${editId}`, expense);

                    editId = null;
                } else {
                    // CREATE
                    await axios.post(API, expense);
                }

                form.reset();
                editId = null;

                // 🔥 reset button text
                submitBtn.innerText = "Add";

                fetchExpenses();

            } catch (err) {

                console.error(err);

            }

        });

        // ✅ DELETE & EDIT
        list.addEventListener("click", async (e) => {

            const id = e.target.dataset.id;

            // DELETE
            if (e.target.classList.contains("delete")) {
                try {
                    await axios.delete(`${API}/${id}`);
                    expenses = expenses.filter(exp => exp.id != id);
                    render(expenses);
                    updateTotal(expenses);
                } catch (err) {
                    console.error(err);
                }
            }

            // EDIT
            if (e.target.classList.contains("edit")) {

                const id = e.target.dataset.id;
                const exp = expenses.find(e => e.id == id);

                form.name.value = exp.name;
                form.amount.value = exp.amount;
                form.category.value = exp.category;
                form.date.value = exp.date;

                // 🔥 store id for update
                editId = id;
                submitBtn.innerText = "Update";

            }

        });

        // ✅ FILTER
        filter.addEventListener("change", () => {

            if (filter.value === "All") {
                render(expenses);
                updateTotal(expenses);
            } else {
                const filtered = expenses.filter(e => e.category === filter.value);
                render(filtered);
                updateTotal(filtered);
            }

        });

        // ✅ RENDER
        function render(data) {

            list.innerHTML = "";

            if (!data.length) {
                list.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No expenses yet 🚀</td></tr>`;
                return;
            }

            const sorted = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));

            sorted.forEach(exp => {
                list.innerHTML += `
                    <tr>
                        <td>${exp.name}</td>
                        <td>₹${Number(exp.amount).toFixed(2)}</td>
                        <td>${exp.category}</td>
                        <td>${formatDate(exp.date)}</td>
                        <td>
                            <button class="btn btn-sm btn-warning edit" data-id="${exp.id}">Edit</button>
                            <button class="btn btn-sm btn-danger delete" data-id="${exp.id}">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // DELETE ALL
        async function deleteAllExpenses() {

            if (!confirm("Delete all expenses?")) return;
            await axios.delete(API);
            fetchExpenses();

        }

        // ✅ TOTAL
        function updateTotal(data) {
            const total = data.reduce((sum, e) => sum + Number(e.amount), 0);
            totalEl.textContent = total.toFixed(2);
        }

        function formatDate(dateStr) {

            const date = new Date(dateStr);

            const day = String(date.getDate()).padStart(2, "0");
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const year = date.getFullYear();

            return `${day}-${month}-${year}`;

        }

    </script>

</body>

</html>
