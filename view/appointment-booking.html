<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Appointment Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            font-family: cursive;
        }

        .container {
            max-width: 1000px;
        }

        .card {
            border-radius: 15px;
        }

        .table th {
            background-color: #343a40;
            color: white;
        }
    </style>
</head>

<body class="bg-warning">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-primary" onclick="window.history.back()">Go Back</button>
            <button class="btn btn-primary" onclick="deleteAll()">Reset</button>
        </div>

        <div class="text-center mb-4">
            <h2>📅 Appointment Booking</h2>
        </div>

        <!-- FORM -->
        <div class="card shadow p-4 mb-4">
            <form id="form">
                <input type="hidden" id="id">

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" id="name" class="form-control" placeholder="Name" required>
                    </div>
                    <div class="col">
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" id="phone" class="form-control" placeholder="Phone" required>
                    </div>
                    <div class="col">
                        <input type="number" id="age" class="form-control" placeholder="Age" required>
                    </div>
                </div>

                <button id="submitBtn" class="btn btn-warning w-100">Add Appointment</button>
            </form>
        </div>

        <!-- TABLE -->
        <div class="card shadow p-3">
            <table class="table table-hover text-center">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>

    </div>

    <script>
        const API = "http://localhost:4000/api/appointments";

        const form = document.getElementById("form");
        const table = document.getElementById("table");
        const submitBtn = document.getElementById("submitBtn");

        let editId = null;

        // LOAD
        window.addEventListener("DOMContentLoaded", fetchData);

        async function fetchData() {
            const res = await axios.get(API);
            render(res.data);
        }

        // ADD / UPDATE
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                name: form.name.value,
                email: form.email.value,
                phone: form.phone.value,
                age: form.age.value
            };

            if (editId) {
                await axios.put(`${API}/${editId}`, data);
                editId = null;
                submitBtn.innerText = "Add Appointment";
            } else {
                await axios.post(API, data);
            }

            form.reset();
            fetchData();
        });

        // RENDER
        function render(data) {

            table.innerHTML = "";

            if (!data.length) {
                table.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No appointments yet 🚀</td></tr>`;
                return;
            }

            data.forEach(user => {

                table.innerHTML += `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td>
                        <td>${user.age}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="edit(${user.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="remove(${user.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // EDIT
        async function edit(id) {
            const res = await axios.get(`${API}/${id}`);
            const u = res.data;

            form.name.value = u.name;
            form.email.value = u.email;
            form.phone.value = u.phone;
            form.age.value = u.age;

            editId = id;
            submitBtn.innerText = "Update Appointment";
        }

        // DELETE
        async function remove(id) {
            await axios.delete(`${API}/${id}`);
            fetchData();
        }

        // DELETE ALL
        async function deleteAll() {
            if (!confirm("Delete all appointments?")) return;
            await axios.delete(API);
            fetchData();
        }
    </script>

</body>

</html>
