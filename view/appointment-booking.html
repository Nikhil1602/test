<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Appointment Booking</title>


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Appointment Booking</h2>


        <!-- Form -->
        <div class="card p-4 mb-4">
            <form id="appointmentForm">
                <input type="hidden" id="userId">

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" id="name" class="form-control" placeholder="Name" required>
                    </div>
                    <div class="col">
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" id="phone" class="form-control" placeholder="Phone" required>
                    </div>
                    <div class="col">
                        <input type="number" id="age" class="form-control" placeholder="Age" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>

        <!-- Table -->
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Age</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>


    </div>

    <script>
        let editMode = false;

        let baseURL = "https://localhost:3000";

        // Load users on page load
        window.onload = fetchUsers;

        // Fetch all users
        async function fetchUsers() {
            try {
                const res = await axios.get(`${baseURL}/users`);
                localStorage.setItem("users", JSON.stringify(res.data));
                displayUsers(res.data);
            } catch (err) {
                console.log(err);
                const localData = JSON.parse(localStorage.getItem("users")) || [];
                displayUsers(localData);
            }
        }

        // Display users in table
        function displayUsers(users) {

            const table = document.getElementById("userTable");
            table.innerHTML = "";

            users.forEach(user => {
                const row = `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td>
                        <td>${user.age}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editUser('${user.id}','${user.name}','${user.email}','${user.phone}','${user.age}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">Delete</button>
                        </td>
                    </tr>
                `;
                table.innerHTML += row;
            });

        }

        // Submit form
        document.getElementById("appointmentForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const id = document.getElementById("userId").value;
            const user = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                age: document.getElementById("age").value
            };

            try {
                if (editMode) {
                    await axios.put(`${baseURL}/users/${id}`, user);
                    editMode = false;
                } else {
                    await axios.post(`${baseURL}/users`, user);
                }

                fetchUsers();
                this.reset();
            } catch (err) {
                console.log(err);
            }
        });

        // Edit user
        function editUser(id, name, email, phone, age) {
            editMode = true;

            document.getElementById("userId").value = id;
            document.getElementById("name").value = name;
            document.getElementById("email").value = email;
            document.getElementById("phone").value = phone;
            document.getElementById("age").value = age;
        }

        // Delete user
        async function deleteUser(id) {
            try {
                await axios.delete(`${baseURL}/users/${id}`);
                fetchUsers();
            } catch (err) {
                console.log(err);
            }
        }

    </script>

</body>

</html>
