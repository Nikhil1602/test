<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .signup-card {
            width: 400px;
            border-radius: 15px;
            padding: 30px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            background: #667eea;
            color: white;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="signup-card">

        <h3 class="title">🚀 Create Account</h3>

        <input id="name" class="form-control mb-3" placeholder="Full Name">
        <input id="email" type="email" class="form-control mb-3" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">

        <button onclick="signup()" class="btn btn-custom w-100">
            Sign Up
        </button>

        <div id="message" class="message"></div>

    </div>

    <script>

        const API = "http://localhost:4000/api";

        // SIGNUP FUNCTION
        async function signup() {

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const message = document.getElementById("message");

            if (!name || !email || !password) {
                message.innerHTML = "⚠️ All fields are required";
                message.style.color = "red";
                return;
            }

            try {

                const res = await axios.post(`${API}/auth/signup`, {
                    name,
                    email,
                    password
                });

                message.innerHTML = "✅ Account created successfully!";
                message.style.color = "green";

                // clear fields
                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";

            } catch (err) {

                message.innerHTML = err.response?.data?.message || "❌ Signup failed";
                message.style.color = "red";

            }
        }

    </script>

</body>

</html>
