<!DOCTYPE html>
<html>

<head>
    <title>Library App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h3>Library Management</h3>

    <input id="bookName" class="form-control mb-2" placeholder="Enter Book Name">
    <button onclick="addBook()" class="btn btn-primary mb-3">Add Book</button>

    <h4>Active Books</h4>
    <div id="books" class="row"></div>

    <h4 class="mt-4">Return History</h4>
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Issued</th>
                <th>Returned</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>

        const API = "http://localhost:4000/books";

        function clearFields() {
            document.getElementById("bookName").value = "";
        }

        async function addBook() {
            const name = document.getElementById("bookName").value;
            await axios.post(API, { name });
            loadBooks();
            clearFields();
        }

        async function loadBooks() {
            const res = await axios.get(API);
            const container = document.getElementById("books");
            container.innerHTML = "";

            res.data.forEach(book => {

                const fine = new Date() > new Date(book.returnAt) ? 300 : 0;

                container.innerHTML += `
                    <div class="col-md-4">
                        <div class="card p-3 mb-3">
                            <h5>${book.name}</h5>
                            <p>Issued: ${new Date(book.issuedAt).toLocaleTimeString()}</p>
                            <p>Return By: ${new Date(book.returnAt).toLocaleTimeString()}</p>
                            <p>Fine: ₹${fine}</p>
                            <button class="btn btn-success" onclick="returnBook(${book.id})">Return</button>
                        </div>
                    </div>
                `;

            });
        }

        async function returnBook(id) {
            await axios.post(`${API}/return/${id}`);
            loadBooks();
            loadHistory();
        }

        async function loadHistory() {
            const res = await axios.get(`${API}/history`);
            const table = document.getElementById("history");
            table.innerHTML = "";

            res.data.forEach(book => {

                table.innerHTML += `
                    <tr>
                        <td>${book.name}</td>
                        <td>${new Date(book.issuedAt).toLocaleTimeString()}</td>
                        <td>${new Date().toLocaleTimeString()}</td>
                    </tr>
                `;

            });
        }

        loadBooks();
        loadHistory();

    </script>

</body>

</html>
