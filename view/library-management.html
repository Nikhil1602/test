<!DOCTYPE html>
<html>

<head>
    <title>Library App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            font-family: cursive, Times, serif;
        }

        .container {
            max-width: 1100px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .book-card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .fine {
            color: red;
            font-weight: bold;
        }

        .no-fine {
            color: green;
        }
    </style>
</head>

<body class="bg-danger">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-warning" onclick="window.history.back()">Go Back</button>
            <button class="btn btn-warning" onclick="deleteAll()">Reset</button>
        </div>

        <!-- HEADER -->
        <div class="header">
            <h2 class="text-white">📚 Library Management System</h2>
        </div>

        <!-- ADD BOOK -->
        <div class="card shadow p-4 mb-4">
            <div class="row g-2">
                <div class="col-md-4">
                    <input id="bookName" class="form-control" placeholder="Enter Book Name">
                </div>
                <div class="col-md-4">
                    <input type="datetime-local" id="issuedAt" class="form-control">
                </div>
                <div class="col-md-4 d-grid">
                    <button id="submitBtn" onclick="addBook()" class="btn btn-danger">Add Book</button>
                </div>
            </div>
        </div>

        <!-- ACTIVE BOOKS -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="text-white">📖 Active Books</h5>
        </div>

        <div id="books" class="row"></div>

        <!-- HISTORY -->
        <div class="card shadow p-3 mt-4">
            <h5>🧾 Return History</h5>

            <div class="table-responsive">
                <table class="table table-hover mt-2">
                    <thead class="table-dark">
                        <tr>
                            <th>Book Name</th>
                            <th>Issued Time</th>
                            <th>Returned Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API = "http://localhost:4000/api/books";
        let editId = null;

        window.addEventListener("DOMContentLoaded", () => {
            setDefaultDateTime();
            setMaxDateTime();
            loadBooks();
            loadHistory();
        });

        function clearFields() {
            bookName.value = "";
            setDefaultDateTime();
        }

        function isFutureDate(dateValue) {
            return new Date(dateValue) > new Date();
        }

        // ADD BOOK
        async function addBook() {

            const name = bookName.value.trim();
            const issued = issuedAt.value;

            if (!name || !issued) return;

            if (isFutureDate(issued)) {
                alert("Issued date cannot be in the future");
                return;
            }

            const data = { name, issuedAt: issued };

            try {

                if (editId) {
                    await axios.put(`${API}/${editId}`, data);
                    editId = null;
                    document.getElementById("submitBtn").innerText = "Add Book";
                } else {
                    await axios.post(API, data);
                }

                clearFields();
                loadBooks();

            } catch (e) {

                console.log(e.message);

            }


        }

        // EDIT BOOK
        async function editBook(id) {

            const res = await axios.get(`${API}/${id}`);
            const book = res.data;

            bookName.value = book.name;

            const d = new Date(book.issuedAt);

            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, "0");
            const day = String(d.getDate()).padStart(2, "0");

            const hours = String(d.getHours()).padStart(2, "0");
            const minutes = String(d.getMinutes()).padStart(2, "0");

            issuedAt.value = `${year}-${month}-${day}T${hours}:${minutes}`;

            editId = id;

            document.getElementById("submitBtn").innerText = "Update Book";

        }

        // DELETE ALL
        async function deleteAll() {

            if (!confirm("Delete all books?")) return;

            await axios.delete(`${API}`);
            loadBooks();
            loadHistory();

        }

        // DELETE BOOK
        async function deleteBook(id) {

            if (!confirm("Delete this book?")) return;

            await axios.delete(`${API}/${id}`);
            loadBooks();

        }

        // LOAD ACTIVE BOOKS
        async function loadBooks() {

            const res = await axios.get(API);
            const container = document.getElementById("books");
            container.innerHTML = "";

            if (!res.data.length) {
                container.innerHTML = `<div class="text-center text-white mt-3 mb-3">No active books yet 🚀</div>`;
                return;
            }

            res.data.forEach(book => {

                const now = new Date();
                const returnDate = new Date(book.returnAt);
                const fine = now > returnDate ? 300 : 0;

                container.innerHTML += `
                    <div class="col-md-4">
                        <div class="card book-card shadow p-3 mb-3">
                            <h5 class="fw-bold mb-3">${book.name}</h5>

                            <p><strong>Issued:</strong> ${new Date(book.issuedAt).toLocaleString()}</p>
                            <p><strong>Return By:</strong> ${returnDate.toLocaleString()}</p>

                            <p class="${fine ? 'fine' : 'no-fine'}">
                                ${fine ? `Fine: ₹${fine}` : 'No Fine'}
                            </p>

                            <div class="d-flex gap-2 mt-2">
                                <button class="btn btn-success w-100" onclick="returnBook(${book.id})">
                                    Return
                                </button>
                            </div>

                            <div class="d-flex gap-2 mt-2">
                                <button class="btn btn-warning w-50" onclick="editBook(${book.id})">
                                    Edit
                                </button>
                                <button class="btn btn-danger w-50" onclick="deleteBook(${book.id})">
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `;

            });

        }

        // RETURN BOOK
        async function returnBook(id) {
            await axios.post(`${API}/return/${id}`);
            loadBooks();
            loadHistory();
        }

        // LOAD HISTORY
        async function loadHistory() {

            const res = await axios.get(`${API}/history`);
            const table = document.getElementById("history");
            table.innerHTML = "";

            if (!res.data.length) {
                table.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No returned books yet 🚀</td></tr>`;
                return;
            }

            res.data.forEach(book => {
                table.innerHTML += `
                    <tr>
                        <td>${book.name}</td>
                        <td>${new Date(book.issuedAt).toLocaleString()}</td>
                        <td>${new Date(book.returnedAt || Date.now()).toLocaleString()}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteHistory(${book.id})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });

        }

        // DELETE HISTORY
        async function deleteHistory(id) {
            await axios.delete(`${API}/history/${id}`);
            loadHistory();
        }

        function setDefaultDateTime() {

            const now = new Date();

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const hours = String(now.getHours()).padStart(2, "0");
            const minutes = String(now.getMinutes()).padStart(2, "0");

            const formatted = `${year}-${month}-${day}T${hours}:${minutes}`;

            document.getElementById("issuedAt").value = formatted;

        }

        function setMaxDateTime() {

            const now = new Date();

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const hours = String(now.getHours()).padStart(2, "0");
            const minutes = String(now.getMinutes()).padStart(2, "0");

            const formatted = `${year}-${month}-${day}T${hours}:${minutes}`;

            document.getElementById("issuedAt").max = formatted;

        }

    </script>

</body>

</html>
