<!DOCTYPE html>
<html>

<head>
    <title>Blog App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <h3>Create Blog</h3>

    <input id="title" class="form-control mb-2" placeholder="Blog Title">
    <input id="author" class="form-control mb-2" placeholder="Author">
    <textarea id="content" class="form-control mb-2" placeholder="Content"></textarea>
    <button onclick="createBlog()" class="btn btn-primary mb-4">Submit</button>

    <h3>Blogs</h3>
    <div id="blogs"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const API = "http://localhost:4000";

        async function createBlog() {

            const data = {
                title: title.value,
                author: author.value,
                content: content.value
            };

            await axios.post(`${API}/blogs`, data);
            loadBlogs();

        }

        async function loadBlogs() {

            try {

                const res = await axios.get(`${API}/blogs`);
                const container = document.getElementById("blogs");

                container.innerHTML = "";

                res.data.forEach(blog => {

                    let commentsHTML = "";

                    (blog.comments || []).forEach(c => {

                        commentsHTML += `
                            <div class="d-flex justify-content-between mt-1">
                                <span>${c.text}</span>
                                <div>
                                    <button onclick="editComment(${c.id}, '${c.text}')" class="btn btn-sm btn-warning">Edit</button>
                                    <button onclick="deleteComment(${c.id})" class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </div>
                        `;

                    });

                    container.innerHTML += `
                        <div class="card p-3 mb-3">
                            <h4>${blog.title}</h4>
                            <small>By ${blog.author}</small>
                            <p>${blog.content}</p>

                            <input id="comment-${blog.id}" class="form-control mb-2" placeholder="Add comment">
                            <button onclick="addComment(${blog.id})" class="btn btn-success btn-sm">Post</button>

                            <div class="mt-2">
                                ${commentsHTML || "<p class='text-muted'>No comments yet</p>"}
                            </div>
                        </div>
                    `;

                });

            } catch (err) {

                console.error("Error loading blogs:", err);

            }

        }

        async function addComment(blogId) {
            const input = document.getElementById(`comment-${blogId}`);
            await axios.post(`${API}/comments`, {
                text: input.value,
                blogId
            });
            loadBlogs();
        }

        async function deleteComment(id) {
            await axios.delete(`${API}/comments/${id}`);
            loadBlogs();
        }

        async function editComment(id, oldText) {

            try {
                const newText = prompt("Edit comment", oldText);
                if (!newText) return;

                await axios.put(`${API}/comments/${id}`, { text: newText });
                loadBlogs();
            } catch (err) {
                console.error("Edit error:", err);
            }

        }

        loadBlogs();
    </script>

</body>

</html>
