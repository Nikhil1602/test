<!DOCTYPE html>
<html>

<head>
    <title>Blog App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            font-family: cursive, Times, serif;
        }

        .container {
            max-width: 900px;
        }

        .blog-card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .blog-card:hover {
            transform: translateY(-4px);
        }

        .comment-box {
            background: #f1f1f1;
            border-radius: 8px;
            padding: 8px;
        }

        .comment-text {
            font-size: 14px;
        }

        .author {
            font-size: 13px;
            color: gray;
        }
    </style>
</head>

<body class="bg-info">

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-warning" onclick="window.history.back()">Go Back</button>
            <button class="btn btn-warning" onclick="deleteAllBlogs()">Reset</button>
        </div>

        <!-- HEADER -->
        <div class="text-center mb-4">
            <h2>📝 Blog Platform</h2>
        </div>

        <!-- CREATE BLOG -->
        <div class="card shadow p-4 mb-4">
            <h5>Create Blog</h5>

            <input id="title" class="form-control mb-2" placeholder="Blog Title">
            <input id="author" class="form-control mb-2" placeholder="Author">
            <textarea id="content" class="form-control mb-2" rows="3" placeholder="Write your content..."></textarea>

            <button onclick="createBlog()" class="btn btn-info w-100">Publish Blog</button>
        </div>

        <!-- BLOG LIST -->
        <div id="blogs"></div>

    </div>

    <script>
        const API = "http://localhost:4000/api";

        // CREATE BLOG
        async function createBlog() {

            const data = {
                title: title.value.trim(),
                author: author.value.trim(),
                content: content.value.trim()
            };

            if (!data.title || !data.author || !data.content) return;

            if (editId) {
                await axios.put(`${API}/blogs/${editId}`, data);
                editId = null;
                document.querySelector("button[onclick='createBlog()']").innerText = "Publish Blog";
            } else {
                await axios.post(`${API}/blogs`, data);
            }

            title.value = "";
            author.value = "";
            content.value = "";

            loadBlogs();

        }

        // LOAD BLOGS
        async function loadBlogs() {

            try {

                const res = await axios.get(`${API}/blogs`);
                const container = document.getElementById("blogs");

                container.innerHTML = "";

                if (!res.data.length) {
                    container.innerHTML = `<p class="text-center text-muted">No blogs yet 🚀</p>`;
                    return;
                }

                res.data.forEach(blog => {

                    let commentsHTML = "";

                    (blog.comments || []).forEach(c => {
                        commentsHTML += `
                            <div class="d-flex justify-content-between align-items-center comment-box mt-2">
                                <span class="comment-text">${c.text}</span>
                                <div>
                                    <button onclick="editComment(${c.id}, '${c.text}')" class="btn btn-sm btn-warning">Edit</button>
                                    <button onclick="deleteComment(${c.id})" class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML += `
                        <div class="card blog-card shadow p-4 mb-4">

                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h4>${blog.title}</h4>
                                <div>
                                    <button onclick="editBlog(${blog.id})" class="btn btn-sm btn-warning">Edit</button>
                                    <button onclick="deleteBlog(${blog.id})" class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </div>
                            <div class="author mb-2">By ${blog.author}</div>

                            <p>${blog.content}</p>

                            <!-- ADD COMMENT -->
                            <div class="d-flex gap-2 mt-3">
                                <input id="comment-${blog.id}" class="form-control" placeholder="Write a comment...">
                                <button onclick="addComment(${blog.id})" class="btn btn-success btn-sm">Post</button>
                            </div>

                            <!-- COMMENTS -->
                            <div class="mt-3">
                                ${commentsHTML || "<p class='text-muted'>No comments yet</p>"}
                            </div>

                        </div>
                    `;
                });

            } catch (err) {

                console.error("Error loading blogs:", err);

            }

        }

        // EDIT BLOG
        async function editBlog(id) {
            const res = await axios.get(`${API}/blogs`);
            const blog = res.data.find(b => b.id === id);

            title.value = blog.title;
            author.value = blog.author;
            content.value = blog.content;

            editId = id;

            document.querySelector("button[onclick='createBlog()']").innerText = "Update Blog";
        }

        // DELETE BLOG
        async function deleteBlog(id) {

            if (!confirm("Delete this blog?")) return;

            await axios.delete(`${API}/blogs/${id}`);
            loadBlogs();

        }

        // DELETE ALL BLOGS
        async function deleteAllBlogs() {

            if (!confirm("Are you sure you want to delete all blogs?")) return;

            await axios.delete(`${API}/blogs`);
            loadBlogs();

        }

        // ADD COMMENT
        async function addComment(blogId) {

            const input = document.getElementById(`comment-${blogId}`);

            if (!input.value.trim()) return;

            await axios.post(`${API}/comments`, {
                text: input.value,
                blogId
            });

            loadBlogs();

        }

        // DELETE COMMENT
        async function deleteComment(id) {

            await axios.delete(`${API}/comments/${id}`);
            loadBlogs();

        }

        // EDIT COMMENT
        async function editComment(id, oldText) {

            const newText = prompt("Edit comment", oldText);
            if (!newText) return;

            await axios.put(`${API}/comments/${id}`, { text: newText });
            loadBlogs();
        }

        // INIT
        loadBlogs();
    </script>

</body>

</html>
