<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Todo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            background: #f4f6f8;
        }

        .container {
            max-width: 700px;
        }

        .todo-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .todo-text {
            flex: 1;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Todo Manager</h2>

        <div class="card p-3 mb-4">

            <input class="form-control mb-2" id="todoName" placeholder="Todo Name">

            <input class="form-control mb-2" id="todoDesc" placeholder="Todo Description">

            <button class="btn btn-primary" onclick="addTodo()">Submit</button>

        </div>

        <h4>List of Todos</h4>
        <ul class="list-group mb-4" id="todoList"></ul>

        <h4>Todo Completed</h4>
        <ul class="list-group" id="completedList"></ul>

    </div>

    <script>

        const API_URL = "https://crudcrud.com/api/f98d8df9fdbe4e4aba27efcb90d681c1/todos";

        document.addEventListener("DOMContentLoaded", loadTodos);

        function loadTodos() {

            axios.get(API_URL).then(res => {

                const todos = res.data;

                document.getElementById("todoList").innerHTML = "";
                document.getElementById("completedList").innerHTML = "";

                todos.forEach(todo => {

                    if (todo.completed) {
                        renderCompleted(todo);
                    } else {
                        renderTodo(todo);
                    }

                });

            });

        }

        function addTodo() {

            const name = document.getElementById("todoName").value.trim();
            const desc = document.getElementById("todoDesc").value.trim();

            if (!name || !desc) return;

            axios.post(API_URL, {
                name: name,
                description: desc,
                completed: false
            }).then(() => {

                document.getElementById("todoName").value = "";
                document.getElementById("todoDesc").value = "";

                loadTodos();
            });

        }

        function renderTodo(todo) {

            const li = document.createElement("li");
            li.className = "list-group-item";

            li.innerHTML = `
                <div class="todo-card">
                    <div class="todo-text">
                        <strong>${todo.name}</strong><br>
                        <small>${todo.description}</small>
                    </div>

                    <div>
                        <button class="btn btn-success btn-sm me-2" onclick="markDone('${todo._id}','${todo.name}','${todo.description}')">
                            Done
                        </button>

                        <button class="btn btn-danger btn-sm" onclick="deleteTodo('${todo._id}')">
                            Cancel
                        </button>
                    </div>
                </div>
            `;

            document.getElementById("todoList").appendChild(li);
        }

        function renderCompleted(todo) {

            const li = document.createElement("li");
            li.className = "list-group-item completed";

            li.innerHTML = `
                <strong>${todo.name}</strong><br>
                <small>${todo.description}</small>
            `;

            document.getElementById("completedList").appendChild(li);
        }

        function deleteTodo(id) {

            axios.delete(`${API_URL}/${id}`).then(() => loadTodos());

        }

        function markDone(id, name, desc) {

            axios.put(`${API_URL}/${id}`, {
                name: name,
                description: desc,
                completed: true
            }).then(() => loadTodos());

        }

    </script>

</body>

</html>
